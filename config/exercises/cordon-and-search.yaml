# Cordon and Search — built-up area
# Cadets surround a building cluster, search for IEDs, manage civilians.
# Exercises: cover polygons, IED detector + CoT marker, civilian ROE,
# OPFOR sniper from cover.

exercise:
  id: "cordon-and-search"
  name: "Cordon and Search (Built-Up Area)"
  description: >
    Blue team establishes a cordon around a building cluster, conducts a
    search for IEDs, and must manage civilian presence under tight ROE.

  geo:
    origin_lat: -35.293935
    origin_lon: 149.166421
    origin_alt: 580.0
    rotation_deg: 0.0
    scale_factor: 150.0

  arena:
    boundary:
      - [0.0, 0.0]
      - [0.852, 0.0]
      - [0.852, 0.723]
      - [0.0, 0.723]
    obstacles: []

  weather:
    visibility_m: 600
    fog_density: 0.0
    time_of_day: 11.0

  weapons:
    M4_carbine:
      max_range_m: 400
      base_pok_at_100m: 0.6
      falloff_per_100m: 0.15
      damage: 1.0
      ammo_capacity: 30
    SVD_sniper:
      max_range_m: 800
      base_pok_at_100m: 0.85
      falloff_per_100m: 0.05
      damage: 1.0
      ammo_capacity: 10

  roe:
    fire_permission: "weapons_tight"
    civilian_proximity_m: 8
    require_target_id: true
    friendly_fire: "critical"

  robots:
    physical:
      - tag_id: 1
        team: "blue"
        vehicle_role: "soldier"
        weapons: ["M4_carbine"]
        sensor_preset: "infantry"
      - tag_id: 2
        team: "blue"
        vehicle_role: "soldier"
        weapons: ["M4_carbine"]
        sensor_preset: "ied_eod"
      - tag_id: 3
        team: "blue"
        vehicle_role: "soldier"
        weapons: ["M4_carbine"]
        sensor_preset: "infantry"
      - tag_id: 4
        team: "blue"
        vehicle_role: "soldier"
        weapons: ["M4_carbine"]
        sensor_preset: "infantry"
    virtual: []

  opfor:
    - id: 100
      vehicle_role: "hostile"
      position: [0.50, 0.40]    # inside building cluster
      weapons: ["SVD_sniper"]
      behavior: "patrol_then_defend"
      patrol_route: []           # static — observe-and-engage from inside
      detection_range_m: 0.5
      engagement_range_m: 0.4
      retreat_health_threshold: 0.5

  virtual_layers:
    cover_polygons:
      - vertices:
          - [0.40, 0.30]
          - [0.55, 0.30]
          - [0.55, 0.42]
          - [0.40, 0.42]
        cover_value: 1.0
        label: "building_alpha"
      - vertices:
          - [0.55, 0.45]
          - [0.65, 0.45]
          - [0.65, 0.55]
          - [0.55, 0.55]
        cover_value: 1.0
        label: "building_bravo"

    civilian_population:
      - position: [0.42, 0.40]
        label: "shopkeeper"
      - position: [0.45, 0.41]
        label: "bystander_1"
      - position: [0.60, 0.50]
        label: "child"

    ied_zones:
      - position: [0.48, 0.38]
        detectability_radius_m: 0.05    # ~7m at scale 150
        label: "device_alpha"
      - position: [0.62, 0.52]
        detectability_radius_m: 0.05
        label: "device_bravo"

    comms_dead_zones:
      - vertices:
          - [0.40, 0.30]
          - [0.55, 0.30]
          - [0.55, 0.42]
          - [0.40, 0.42]
        label: "inside_building_alpha"

  sensors_available:
    - thermal
    - rangefinder
    - ied_detector
    - gps
